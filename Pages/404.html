<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Dark X</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="../index.html" class="logo">
                    <img src="../assets/images/logo/logo-dark.svg" alt="Dark X" class="logo-image">
                </a>
                <nav class="nav-main">
                    <ul class="nav-list">
                        <li class="nav-item"><a href="primary-home.html" class="nav-link">Home</a></li>
                        <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
                        <li class="nav-item"><a href="features.html" class="nav-link">Features</a></li>
                        <li class="nav-item"><a href="blog.html" class="nav-link">Blog</a></li>
                        <li class="nav-item"><a href="pricing.html" class="nav-link">Pricing</a></li>
                        <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
                    </ul>
                </nav>
                <div class="header-actions">
                    <a href="contact.html" class="btn btn-ghost">Sign In</a>
                    <a href="pricing.html" class="btn btn-primary">Get Started</a>
                </div>
                <button class="cart-button"><i class="bi bi-cart3"></i><span class="cart-count">0</span></button>
                <button class="mobile-menu-toggle" aria-label="Menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
            </div>
        </div>
    </header>

    <!-- 404 Content -->
    <section class="error-page">
        <div class="container">
            <div class="error-content">
                <div class="error-code">404</div>
                <h1 class="error-title">Page Not Found</h1>
                <p class="error-description">
                    Sorry, the page you're looking for doesn't exist or has been moved.
                </p>
                <div class="error-actions">
                    <a href="../index.html" class="btn btn-primary btn-lg">
                        <i class="bi bi-house"></i> Go Home
                    </a>
                    <a href="contact.html" class="btn btn-secondary btn-lg">
                        <i class="bi bi-chat-dots"></i> Contact Support
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer footer-simple">
        <div class="container">
            <div class="footer-simple-content">
                <a href="../index.html" class="footer-logo">
                    <img src="../assets/images/logo/logo-dark.svg" alt="Dark X">
                </a>
                <p class="footer-copyright">
                    Copyright © Dark X | Designed by <a href="https://brixtemplates.com">BRIX Templates</a>
                </p>
            </div>
        </div>
    </footer>

    <style>
        .error-page {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--space-20) 0;
        }

        .error-content {
            max-width: 600px;
        }

        .error-code {
            font-size: 150px;
            font-weight: var(--font-weight-extrabold);
            background: linear-gradient(135deg, var(--color-accent), var(--color-accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: var(--space-4);
        }

        .error-title {
            font-size: var(--font-size-3xl);
            margin-bottom: var(--space-4);
        }

        .error-description {
            font-size: var(--font-size-lg);
            color: var(--color-text-secondary);
            margin-bottom: var(--space-8);
        }

        .error-actions {
            display: flex;
            justify-content: center;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .footer-simple {
            padding: var(--space-8) 0;
            border-top: 1px solid var(--color-border);
        }

        .footer-simple-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-simple-content .footer-logo img {
            height: 28px;
        }

        @media (max-width: 640px) {
            .error-code {
                font-size: 100px;
            }

            .footer-simple-content {
                flex-direction: column;
                gap: var(--space-4);
            }
        }
    </style>
</body>
</html>
