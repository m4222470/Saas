<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Protected | Dark X</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
    <!-- Protected Content Banner -->
    <div class="protected-banner">
        <div class="container">
            <div class="protected-banner-content">
                <i class="bi bi-lock"></i>
                <span>This content is password protected. Please enter your password to continue.</span>
            </div>
        </div>
    </div>

    <!-- Password Form -->
    <section class="password-section">
        <div class="container">
            <div class="password-card">
                <div class="password-icon">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h1 class="password-title">Protected Content</h1>
                <p class="password-description">
                    Enter your password to access this exclusive content.
                </p>
                <form class="password-form" id="password-form">
                    <div class="password-input-wrapper">
                        <input type="password" id="password" placeholder="Enter password" required>
                        <button type="submit" class="password-toggle">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-full">
                        <i class="bi bi-unlock"></i> Unlock
                    </button>
                </form>
                <p class="password-help">
                    Don't have a password? <a href="contact.html">Contact us</a> to request access.
                </p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer footer-simple">
        <div class="container">
            <div class="footer-simple-content">
                <a href="../index.html" class="footer-logo">
                    <img src="../assets/images/logo/logo-dark.svg" alt="Dark X">
                </a>
                <p class="footer-copyright">
                    Copyright © Dark X | Designed by <a href="https://brixtemplates.com">BRIX Templates</a>
                </p>
            </div>
        </div>
    </footer>

    <script>
        // Password form handling
        document.getElementById('password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;

            // Simple password check (demo only)
            if (password === 'demo123') {
                alert('Password correct! Content would be unlocked in a real implementation.');
            } else {
                alert('Incorrect password. Please try again.');
            }
        });

        // Toggle password visibility
        document.querySelector('.password-toggle').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        });
    </script>

    <style>
        .protected-banner {
            padding: var(--space-3) 0;
            background: var(--color-bg-secondary);
            border-bottom: 1px solid var(--color-border);
        }

        .protected-banner-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-3);
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }

        .protected-banner i {
            color: var(--color-warning);
        }

        .password-section {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-20) 0;
        }

        .password-card {
            max-width: 450px;
            width: 100%;
            padding: var(--space-10);
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-2xl);
            text-align: center;
        }

        .password-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto var(--space-6);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-accent), var(--color-accent-2));
            border-radius: var(--radius-xl);
            font-size: var(--font-size-3xl);
            color: white;
        }

        .password-title {
            font-size: var(--font-size-2xl);
            margin-bottom: var(--space-2);
        }

        .password-description {
            color: var(--color-text-secondary);
            margin-bottom: var(--space-6);
        }

        .password-form {
            margin-bottom: var(--space-6);
        }

        .password-input-wrapper {
            position: relative;
            margin-bottom: var(--space-4);
        }

        .password-input-wrapper input {
            width: 100%;
            padding: var(--space-4);
            padding-right: var(--space-12);
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            color: var(--color-text-primary);
            font-size: var(--font-size-base);
        }

        .password-input-wrapper input:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        .password-toggle {
            position: absolute;
            right: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-muted);
        }

        .password-toggle:hover {
            color: var(--color-text-primary);
        }

        .password-help {
            font-size: var(--font-size-sm);
            color: var(--color-text-muted);
        }

        .password-help a {
            color: var(--color-accent);
        }

        .footer-simple {
            padding: var(--space-8) 0;
            border-top: 1px solid var(--color-border);
        }

        .footer-simple-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-simple-content .footer-logo img {
            height: 28px;
        }
    </style>
</body>
</html>
